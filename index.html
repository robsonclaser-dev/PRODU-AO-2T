<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2T Produção Industrial</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --bg4: #2e2e2e;
  --amber: #f59e0b;
  --amber-dim: #92610a;
  --text: #e5e5e5;
  --text-dim: #888;
  --border: #333;
  --red: #ef4444;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --col-recebido: #334155;
  --col-caldeiraria: #1e3a5f;
  --col-jateamento: #3b2a1a;
  --col-pintura: #1a2e1a;
  --col-montagem: #1e1b4b;
  --col-expedicao: #2d1b4e;
  --col-finalizado: #14532d;
  --radius: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
code, .mono { font-family: 'IBM Plex Mono', monospace; }

/* ═══ LOGIN ═══ */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.login-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 40px; width: 340px; box-shadow: var(--shadow);
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo h1 { font-size: 22px; font-weight: 700; color: var(--amber); letter-spacing: 2px; }
.login-logo p { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
.login-box input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px; border-radius: var(--radius);
  font-family: inherit; font-size: 14px; margin-bottom: 12px;
  transition: border-color .2s;
}
.login-box input:focus { outline: none; border-color: var(--amber); }
.login-box button {
  width: 100%; background: var(--amber); color: #000; font-weight: 700;
  font-size: 15px; padding: 11px; border: none; border-radius: var(--radius);
  cursor: pointer; font-family: inherit; transition: opacity .2s;
}
.login-box button:hover { opacity: .85; }
.login-err { color: var(--red); font-size: 12px; text-align: center; margin-top: 8px; display: none; }
.login-users { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
.login-users p { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
.user-chip {
  display: inline-block; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--text-dim);
  margin: 2px; cursor: pointer; transition: border-color .2s;
}
.user-chip:hover { border-color: var(--amber); color: var(--amber); }

/* ═══ TOPBAR ═══ */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 56px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100;
}
.topbar-logo { font-weight: 700; font-size: 16px; color: var(--amber); letter-spacing: 1px; white-space: nowrap; }
.topbar-search {
  flex: 1; max-width: 300px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); display: flex; align-items: center; padding: 0 10px; gap: 8px;
}
.topbar-search input {
  background: none; border: none; color: var(--text); font-family: inherit;
  font-size: 13px; width: 100%; outline: none;
}
.topbar-search input::placeholder { color: var(--text-dim); }
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.btn {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 6px 14px; border-radius: var(--radius); font-family: inherit;
  font-size: 13px; cursor: pointer; transition: all .2s; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.btn:hover { border-color: var(--amber); color: var(--amber); }
.btn.primary { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 700; }
.btn.primary:hover { opacity: .85; }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: var(--red); color: #fff; }
.user-badge {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
  padding: 4px 12px; font-size: 12px; color: var(--amber); white-space: nowrap;
}
#filter-proj {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: var(--radius); padding: 6px 10px; font-family: inherit;
  font-size: 13px; cursor: pointer; outline: none;
}
#filter-proj:focus { border-color: var(--amber); }

/* ═══ TABS ═══ */
#tabs {
  position: fixed; top: 56px; left: 0; right: 0;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; gap: 0; z-index: 99; overflow-x: auto;
  scrollbar-width: none;
}
#tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 10px 18px; font-size: 13px; color: var(--text-dim); cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: all .2s;
  display: flex; align-items: center; gap: 6px; font-weight: 500;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--amber); border-bottom-color: var(--amber); }
.badge {
  background: var(--amber); color: #000; border-radius: 10px;
  padding: 1px 6px; font-size: 10px; font-weight: 700;
}
.badge.red { background: var(--red); color: #fff; }

/* ═══ MAIN ═══ */
#main { margin-top: 100px; padding: 16px; }

/* ═══ KANBAN ═══ */
#kanban {
  display: flex; gap: 12px; overflow-x: auto; padding-bottom: 20px;
  align-items: flex-start;
}
#kanban::-webkit-scrollbar { height: 6px; }
#kanban::-webkit-scrollbar-track { background: var(--bg2); }
#kanban::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.kanban-col {
  min-width: 220px; width: 220px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column;
}
.col-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13px;
}
.col-count {
  margin-left: auto; background: var(--bg3); border-radius: 10px;
  padding: 1px 8px; font-size: 11px; color: var(--text-dim);
}
.col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 80px; }
.col-body.drag-over { background: rgba(245,158,11,.07); border-radius: 8px; }

/* ═══ CARD ═══ */
.peca-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 11px 12px; cursor: grab;
  transition: all .2s; position: relative; user-select: none;
}
.peca-card:hover { border-color: var(--amber); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.4); }
.peca-card.dragging { opacity: .4; cursor: grabbing; }
.card-codigo { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--amber); }
.card-projeto { font-size: 10px; color: var(--text-dim); margin-top: 1px; text-transform: uppercase; letter-spacing: .5px; }
.card-desc { font-size: 12px; color: var(--text); margin-top: 6px; line-height: 1.4; }
.card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tag {
  background: var(--bg4); border-radius: 4px; padding: 2px 7px;
  font-size: 10px; color: var(--text-dim);
}
.card-resp { font-size: 11px; color: var(--blue); margin-top: 6px; }
.card-date { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.card-actions { display: flex; gap: 4px; margin-top: 8px; }
.card-btn {
  flex: 1; background: var(--bg4); border: 1px solid var(--border);
  color: var(--text-dim); border-radius: 5px; padding: 4px 6px;
  font-size: 10px; cursor: pointer; font-family: inherit; transition: all .15s; text-align: center;
}
.card-btn:hover { border-color: var(--amber); color: var(--amber); }
.card-btn.adv { border-color: var(--green); color: var(--green); }
.card-btn.adv:hover { background: var(--green); color: #000; }
.prio-dot {
  position: absolute; top: 10px; right: 10px;
  width: 8px; height: 8px; border-radius: 50%;
}
.prio-alta { background: var(--red); box-shadow: 0 0 6px var(--red); }
.prio-media { background: var(--amber); }
.prio-baixa { background: var(--green); }
.atrasado-flag {
  font-size: 9px; background: rgba(239,68,68,.15); color: var(--red);
  border: 1px solid rgba(239,68,68,.3); border-radius: 4px; padding: 1px 6px;
  margin-top: 4px; display: inline-block;
}
.card-foto { width: 100%; border-radius: 5px; margin-top: 8px; max-height: 80px; object-fit: cover; cursor: pointer; }

/* ═══ PAINEL ATRASADOS ═══ */
#painel-atrasados {
  background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.3);
  border-radius: 10px; padding: 14px; margin-bottom: 16px;
}
#painel-atrasados h3 { color: var(--red); font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.atrasado-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px; background: rgba(239,68,68,.05); border-radius: 6px;
  margin-bottom: 6px; font-size: 12px; border: 1px solid rgba(239,68,68,.2);
}
.atrasado-item .mono { color: var(--amber); font-size: 11px; }

/* ═══ MODAL ═══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 16px;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-header {
  padding: 18px 20px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg2); z-index: 1;
}
.modal-header h2 { font-size: 16px; font-weight: 700; color: var(--amber); }
.modal-close { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--red); }
.modal-body { padding: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 9px 12px; border-radius: var(--radius);
  font-family: inherit; font-size: 13px; transition: border-color .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--amber);
}
.form-group textarea { resize: vertical; min-height: 70px; }
.form-group select option { background: var(--bg3); }
.prio-selector { display: flex; gap: 8px; }
.prio-btn {
  flex: 1; padding: 8px; border-radius: 6px; border: 2px solid var(--border);
  cursor: pointer; font-size: 12px; font-weight: 600; text-align: center;
  background: var(--bg3); color: var(--text-dim); font-family: inherit; transition: all .2s;
}
.prio-btn.selected-alta { border-color: var(--red); color: var(--red); background: rgba(239,68,68,.1); }
.prio-btn.selected-media { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,.1); }
.prio-btn.selected-baixa { border-color: var(--green); color: var(--green); background: rgba(34,197,94,.1); }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* ═══ HISTÓRICO ═══ */
.hist-list { display: flex; flex-direction: column; gap: 0; }
.hist-item {
  padding: 10px 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px; font-size: 12px;
}
.hist-item:last-child { border-bottom: none; }
.hist-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); margin-top: 4px; flex-shrink: 0; }
.hist-time { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
.hist-txt { flex: 1; color: var(--text); }
.hist-user { color: var(--blue); }

/* ═══ RELATÓRIO ═══ */
#rel-view { display: none; }
.rel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.rel-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; text-align: center;
}
.rel-num { font-size: 32px; font-weight: 700; color: var(--amber); font-family: 'IBM Plex Mono', monospace; }
.rel-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
.rel-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.rel-table th { background: var(--bg3); color: var(--text-dim); padding: 8px 10px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; }
.rel-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.rel-table tr:hover td { background: rgba(245,158,11,.04); }
.print-btn { display: flex; justify-content: flex-end; margin-bottom: 12px; gap: 8px; }

/* ═══ FOTO MODAL ═══ */
#foto-modal { display: none; }
#foto-modal img { max-width: 90vw; max-height: 85vh; border-radius: 10px; }
#foto-modal .modal-overlay { flex-direction: column; gap: 12px; }

/* ═══ TOAST ═══ */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9000;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 18px; font-size: 13px;
  box-shadow: var(--shadow); transform: translateY(60px); opacity: 0;
  transition: all .3s; pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.ok { border-left: 3px solid var(--green); }
#toast.err { border-left: 3px solid var(--red); }

/* ═══ EMPTY ═══ */
.empty { text-align: center; padding: 20px 10px; color: var(--text-dim); font-size: 12px; }
.empty span { font-size: 22px; display: block; margin-bottom: 6px; }

/* ═══ RESP ═══ */
@media (max-width: 600px) {
  #topbar { flex-wrap: wrap; height: auto; padding: 10px 12px; gap: 8px; }
  .topbar-search { max-width: 100%; flex: 1 1 100%; }
  #main { margin-top: 120px; padding: 10px; }
  #kanban { gap: 8px; }
  .kanban-col { min-width: 200px; width: 200px; }
  .form-row { grid-template-columns: 1fr; }
}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══ DETALHE PEÇA ═══ */
.det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.det-field label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
.det-field p { font-size: 13px; color: var(--text); margin-top: 2px; }
.det-field .mono { color: var(--amber); font-size: 14px; }
.etapa-track { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
.etapa-chip {
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); color: var(--text-dim); background: var(--bg3);
}
.etapa-chip.current { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,.1); }
.etapa-chip.done { border-color: var(--green); color: var(--green); background: rgba(34,197,94,.07); }
.mover-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.mover-btn {
  padding: 8px 14px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg3); color: var(--text); font-family: inherit; font-size: 12px;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 5px;
}
.mover-btn:hover { border-color: var(--amber); color: var(--amber); }
.mover-btn.active-step { border-color: var(--amber); color: #000; background: var(--amber); font-weight: 700; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>⚙ 2T PRODUÇÃO</h1>
      <p>Sistema de Rastreamento Industrial</p>
    </div>
    <input type="text" id="login-user" placeholder="Usuário" autocomplete="off">
    <input type="password" id="login-pass" placeholder="Senha">
    <button onclick="doLogin()">ENTRAR</button>
    <div class="login-err" id="login-err">Usuário ou senha incorretos</div>
    <div class="login-users">
      <p>▸ Clique para preencher</p>
      <span class="user-chip" onclick="quickLogin('admin','admin123')">admin</span>
      <span class="user-chip" onclick="quickLogin('robson','2t2025')">robson</span>
      <span class="user-chip" onclick="quickLogin('operador','op123')">operador</span>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div id="topbar" style="display:none">
  <div class="topbar-logo">⚙ 2T</div>
  <div class="topbar-search">
    🔍 <input type="text" id="search-input" placeholder="Buscar peça... (ex: 518-A)" oninput="renderKanban()">
  </div>
  <select id="filter-proj" onchange="renderKanban()">
    <option value="">Todos os projetos</option>
  </select>
  <div class="topbar-actions">
    <button class="btn primary" onclick="abrirModalNova()">+ NOVA PEÇA</button>
    <button class="btn" onclick="mostrarTab('relatorio')">📊 Relatório</button>
    <div class="user-badge" id="user-label">—</div>
    <button class="btn danger" onclick="logout()" title="Sair">✕</button>
  </div>
</div>

<!-- TABS -->
<div id="tabs" style="display:none">
  <div class="tab active" data-tab="kanban" onclick="mostrarTab('kanban')">📋 Kanban <span class="badge" id="badge-total">0</span></div>
  <div class="tab" data-tab="atrasados" onclick="mostrarTab('atrasados')">⚠️ Atrasados <span class="badge red" id="badge-atrasados">0</span></div>
  <div class="tab" data-tab="relatorio" onclick="mostrarTab('relatorio')">📊 Relatório</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

  <!-- KANBAN VIEW -->
  <div id="kanban-view">
    <div id="painel-atrasados" style="display:none">
      <h3>🔴 Peças Atrasadas <span id="at-count"></span></h3>
      <div id="at-list"></div>
    </div>
    <div id="kanban"></div>
  </div>

  <!-- ATRASADOS VIEW -->
  <div id="atrasados-view" style="display:none">
    <h2 style="color:var(--red);margin-bottom:16px;font-size:16px;">⚠️ Painel de Atrasados</h2>
    <div id="atrasados-full"></div>
  </div>

  <!-- RELATÓRIO VIEW -->
  <div id="rel-view">
    <div class="print-btn">
      <button class="btn" onclick="exportarCSV()">⬇ CSV</button>
      <button class="btn primary" onclick="window.print()">🖨 Imprimir</button>
    </div>
    <div class="rel-grid" id="rel-stats"></div>
    <h3 style="margin-bottom:12px;font-size:14px;color:var(--text-dim);">TODAS AS PEÇAS</h3>
    <table class="rel-table">
      <thead><tr><th>Código</th><th>Projeto</th><th>Material</th><th>Qtd</th><th>Etapa</th><th>Responsável</th><th>Entrada</th><th>Dias</th></tr></thead>
      <tbody id="rel-tbody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL NOVA / EDITAR PEÇA -->
<div class="modal-overlay" id="modal-peca" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-titulo">NOVA PEÇA</h2>
      <button class="modal-close" onclick="fecharModal('modal-peca')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Código da Peça *</label>
          <input id="f-codigo" placeholder="ex: 518-A" class="mono">
        </div>
        <div class="form-group">
          <label>Projeto *</label>
          <input id="f-projeto" placeholder="ex: RON02, FS, DEDINI">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Material</label>
          <input id="f-material" placeholder="ex: A36, Inox 304">
        </div>
        <div class="form-group">
          <label>Medida</label>
          <input id="f-medida" placeholder="ex: 150x200x10">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Quantidade</label>

          <button class="prio-btn" id="pb-media" onclick="selPrio('media')">🟡 MÉDIA</button>
          <button class="prio-btn" id="pb-baixa" onclick="selPrio('baixa')">🟢 BAIXA</button>

      <div class="form-group">
        <label>Observação</label>
        <textarea id="f-obs" placeholder="Anotações, referências, especificações..."></textarea>

        <label>Foto / Desenho Técnico</label>
        <input type="file" id="f-foto" accept="image/*" onchange="previewFoto(this)">

<div class="modal-overlay" id="modal-det" style="display:none">

    <button class="btn" onclick="fecharFotoModal()">Fechar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// USUÁRIOS
// ═══════════════════════════════════════════════
const USERS = {
  'admin':    { senha: 'admin123', nome: 'Administrador', role: 'admin' },
  'robson':   { senha: '2t2025',   nome: 'Robson',        role: 'admin' },
  'operador': { senha: 'op123',    nome: 'Operador',      role: 'user'  }
};

let currentUser = null;

// ═══════════════════════════════════════════════
// ETAPAS
// ═══════════════════════════════════════════════
const ETAPAS = [
  { id: 'recebido',    label: '📥 Recebido',    cor: 'var(--col-recebido)' },
  { id: 'caldeiraria', label: '🔩 Caldeiraria', cor: 'var(--col-caldeiraria)' },
  { id: 'jateamento',  label: '🪨 Jateamento',  cor: 'var(--col-jateamento)' },
  { id: 'pintura',     label: '🎨 Pintura',     cor: 'var(--col-pintura)' },
  { id: 'montagem',    label: '🔧 Montagem',    cor: 'var(--col-montagem)' },
  { id: 'expedicao',   label: '🚚 Expedição',   cor: 'var(--col-expedicao)' },
  { id: 'finalizado',  label: '✅ Finalizado',  cor: 'var(--col-finalizado)' }
];

// ═══════════════════════════════════════════════
// DB (IndexedDB)
// ═══════════════════════════════════════════════
let db;

function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('2TProd', 2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('pecas')) {
        const s = d.createObjectStore('pecas', { keyPath: 'id' });
        s.createIndex('projeto', 'projeto', { unique: false });
        s.createIndex('etapa', 'etapa', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => rej(req.error);
  });
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction('pecas', 'readonly');
    const req = tx.objectStore('pecas').getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

function dbPut(peca) {
  return new Promise((res, rej) => {
    const tx = db.transaction('pecas', 'readwrite');
    const req = tx.objectStore('pecas').put(peca);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction('pecas', 'readwrite');
    const req = tx.objectStore('pecas').delete(id);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

// ═══════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════
function doLogin() {
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  if (USERS[u] && USERS[u].senha === p) {
    currentUser = { ...USERS[u], login: u };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('topbar').style.display = 'flex';
    document.getElementById('tabs').style.display = 'flex';
    document.getElementById('main').style.display = 'block';
    document.getElementById('user-label').textContent = '👤 ' + currentUser.nome;
    mostrarTab('kanban');
  } else {
    document.getElementById('login-err').style.display = 'block';
    setTimeout(() => document.getElementById('login-err').style.display = 'none', 2500);
  }
}

function quickLogin(u, p) {
  document.getElementById('login-user').value = u;
  document.getElementById('login-pass').value = p;
}

function logout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('main').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
function mostrarTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const el = document.querySelector(`.tab[data-tab="${tab}"]`);
  if (el) el.classList.add('active');
  document.getElementById('kanban-view').style.display   = tab === 'kanban'    ? 'block' : 'none';
  document.getElementById('atrasados-view').style.display = tab === 'atrasados' ? 'block' : 'none';
  document.getElementById('rel-view').style.display      = tab === 'relatorio'  ? 'block' : 'none';
  if (tab === 'kanban')    renderKanban();
  if (tab === 'atrasados') renderAtrasados();
  if (tab === 'relatorio') renderRelatorio();
}

// ═══════════════════════════════════════════════
// RENDER KANBAN
// ═══════════════════════════════════════════════
async function renderKanban() {
  const pecas = await dbGetAll();
  const search = document.getElementById('search-input').value.toLowerCase();
  const proj   = document.getElementById('filter-proj').value;
  atualizarProjFiltro(pecas);

  let filtered = pecas;
  if (search) filtered = filtered.filter(p =>
    p.codigo.toLowerCase().includes(search) ||
    p.projeto.toLowerCase().includes(search) ||
    (p.material || '').toLowerCase().includes(search) ||
    (p.obs || '').toLowerCase().includes(search)
  );
  if (proj) filtered = filtered.filter(p => p.projeto === proj);

  // badges
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const atrasados = pecas.filter(p => p.etapa !== 'finalizado' && p.sla && p.dataEntrada && diasDesde(p.dataEntrada) > p.sla);
  document.getElementById('badge-total').textContent    = pecas.length;
  document.getElementById('badge-atrasados').textContent = atrasados.length;

  // painel atrasados topo
  const atPanel = document.getElementById('painel-atrasados');
  const atList  = document.getElementById('at-list');
  if (atrasados.length > 0) {
    atPanel.style.display = 'block';
    document.getElementById('at-count').textContent = `(${atrasados.length})`;
    atList.innerHTML = atrasados.slice(0,3).map(p => `
      <div class="atrasado-item">
        <span class="mono">${p.codigo}</span>
        <span>${p.projeto}</span>
        <span style="color:var(--amber)">${etapaLabel(p.etapa)}</span>
        <span style="color:var(--red);margin-left:auto">${diasDesde(p.dataEntrada)}d / SLA ${p.sla}d</span>
        <button class="card-btn" onclick="verDetalhe('${p.id}')">Ver</button>
      </div>`).join('');
  } else {
    atPanel.style.display = 'none';
  }

  // kanban cols
  const kanban = document.getElementById('kanban');
  kanban.innerHTML = ETAPAS.map(et => {
    const cards = filtered.filter(p => p.etapa === et.id);
    return `
    <div class="kanban-col" id="col-${et.id}" ondragover="onDragOver(event,'${et.id}')" ondrop="onDrop(event,'${et.id}')" ondragleave="onDragLeave(event)">
      <div class="col-header" style="background:${et.cor}">
        ${et.label}
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-body" id="body-${et.id}">
        ${cards.length === 0 ? '<div class="empty"><span>◦</span>Vazio</div>' : ''}
        ${cards.map(p => cardHTML(p)).join('')}
      </div>
    </div>`;
  }).join('');
}

function cardHTML(p) {
  const dias   = diasDesde(p.dataEntrada);
  const atras  = p.etapa !== 'finalizado' && p.sla && dias > p.sla;
  const proxEt = proximaEtapa(p.etapa);
  return `
  <div class="peca-card" id="card-${p.id}"
    draggable="true"
    ondragstart="onDragStart(event,'${p.id}')"
    ondragend="onDragEnd(event)">
    <div class="prio-dot prio-${p.prioridade || 'media'}"></div>
    <div class="card-codigo">${p.codigo}</div>
    <div class="card-projeto">${p.projeto}</div>
    <div class="card-desc">${p.material || '—'}${p.medida ? ' · ' + p.medida : ''}</div>
    <div class="card-meta">
      ${p.qtd > 1 ? `<span class="tag">Qtd: ${p.qtd}</span>` : ''}
      ${p.sla ? `<span class="tag">SLA: ${p.sla}d</span>` : ''}
      <span class="tag">${dias}d</span>
    </div>
    ${atras ? '<span class="atrasado-flag">⚠ ATRASADO</span>' : ''}
    ${p.responsavel ? `<div class="card-resp">👤 ${p.responsavel}</div>` : ''}
    ${p.foto ? `<img class="card-foto" src="${p.foto}" onclick="abrirFoto('${p.id}')" title="Ver foto">` : ''}
    <div class="card-actions">
      <button class="card-btn" onclick="verDetalhe('${p.id}')">Detalhes</button>
      ${proxEt ? `<button class="card-btn adv" onclick="avancarEtapa('${p.id}')">▶ ${etapaLabel(proxEt)}</button>` : ''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
// DRAG AND DROP
// ═══════════════════════════════════════════════
let dragId = null;

function onDragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { const el = document.getElementById('card-' + id); if (el) el.classList.add('dragging'); }, 0);
}
function onDragEnd(e) {
  const el = document.getElementById('card-' + dragId);
  if (el) el.classList.remove('dragging');
}
function onDragOver(e, colId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over'));
  document.getElementById('body-' + colId).classList.add('drag-over');
}
function onDragLeave(e) {
  document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over'));
}
async function onDrop(e, colId) {
  e.preventDefault();
  document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over'));
  if (!dragId) return;
  const pecas = await dbGetAll();
  const p = pecas.find(x => x.id === dragId);
  if (!p || p.etapa === colId) return;
  const antigo = p.etapa;
  p.etapa = colId;
  adicionarHist(p, `Movida de ${etapaLabel(antigo)} → ${etapaLabel(colId)}`);
  await dbPut(p);
  toast(`${p.codigo} → ${etapaLabel(colId)}`, 'ok');
  renderKanban();
  dragId = null;
}

// ═══════════════════════════════════════════════
// AVANCAR ETAPA (botão)
// ═══════════════════════════════════════════════
async function avancarEtapa(id) {
  const pecas = await dbGetAll();
  const p = pecas.find(x => x.id === id);
  if (!p) return;
  const prox = proximaEtapa(p.etapa);
  if (!prox) return;
  const antigo = p.etapa;
  p.etapa = prox;
  adicionarHist(p, `Avançada de ${etapaLabel(antigo)} → ${etapaLabel(prox)}`);
  await dbPut(p);
  toast(`${p.codigo} → ${etapaLabel(prox)}`, 'ok');
  renderKanban();
}

// ═══════════════════════════════════════════════
// MODAL NOVA PEÇA
// ═══════════════════════════════════════════════
let editId = null;
let prioDest = 'media';

function abrirModalNova() {
  editId = null;
  prioDest = 'media';
  document.getElementById('modal-titulo').textContent = 'NOVA PEÇA';
  ['codigo','projeto','material','medida','obs'].forEach(f => document.getElementById('f-' + f).value = '');
  document.getElementById('f-qtd').value = 1;
  document.getElementById('f-resp').value = '';
  document.getElementById('f-sla').value = '';
  document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-foto').value = '';
  document.getElementById('f-foto-prev').style.display = 'none';
  selPrio('media');
  document.getElementById('modal-peca').style.display = 'flex';
  setTimeout(() => document.getElementById('f-codigo').focus(), 100);
}

async function abrirModalEditar(id) {
  const pecas = await dbGetAll();
  const p = pecas.find(x => x.id === id);
  if (!p) return;
  editId = id;
  prioDest = p.prioridade || 'media';
  document.getElementById('modal-titulo').textContent = 'EDITAR PEÇA';
  document.getElementById('f-codigo').value   = p.codigo;
  document.getElementById('f-projeto').value  = p.projeto;
  document.getElementById('f-material').value = p.material || '';
  document.getElementById('f-medida').value   = p.medida || '';
  document.getElementById('f-qtd').value      = p.qtd || 1;
  document.getElementById('f-resp').value     = p.responsavel || '';
  document.getElementById('f-sla').value      = p.sla || '';
  document.getElementById('f-data').value     = p.dataEntrada || '';
  document.getElementById('f-obs').value      = p.obs || '';
  selPrio(prioDest);
  if (p.foto) {
    const prev = document.getElementById('f-foto-prev');
    prev.src = p.foto; prev.style.display = 'block';
  } else {
    document.getElementById('f-foto-prev').style.display = 'none';
  }
  fecharModal('modal-det');
  document.getElementById('modal-peca').style.display = 'flex';
}

function selPrio(p) {
  prioDest = p;
  ['alta','media','baixa'].forEach(x => {
    const b = document.getElementById('pb-' + x);
    b.className = 'prio-btn';
    if (x === p) b.classList.add('selected-' + x);
  });
}

function previewFoto(input) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    const prev = document.getElementById('f-foto-prev');
    prev.src = e.target.result; prev.style.display = 'block';
  };
  r.readAsDataURL(f);
}

async function salvarPeca() {
  const codigo = document.getElementById('f-codigo').value.trim().toUpperCase();
  const projeto = document.getElementById('f-projeto').value.trim().toUpperCase();
  if (!codigo || !projeto) { toast('Código e Projeto são obrigatórios!', 'err'); return; }

  const prev = document.getElementById('f-foto-prev');
  const fotoBase64 = prev.style.display !== 'none' ? prev.src : null;

  if (editId) {
    const pecas = await dbGetAll();
    const p = pecas.find(x => x.id === editId);
    if (!p) return;
    p.codigo     = codigo;
    p.projeto    = projeto;
    p.material   = document.getElementById('f-material').value.trim();
    p.medida     = document.getElementById('f-medida').value.trim();
    p.qtd        = parseInt(document.getElementById('f-qtd').value) || 1;
    p.responsavel = document.getElementById('f-resp').value;
    p.sla        = parseInt(document.getElementById('f-sla').value) || null;
    p.dataEntrada = document.getElementById('f-data').value;
    p.obs        = document.getElementById('f-obs').value.trim();
    p.prioridade = prioDest;
    if (fotoBase64 && fotoBase64 !== (p.foto || '')) p.foto = fotoBase64;
    adicionarHist(p, 'Dados editados');
    await dbPut(p);
    toast('Peça atualizada!', 'ok');
  } else {
    const peca = {
      id: 'p_' + Date.now(),
      codigo, projeto,
      material:    document.getElementById('f-material').value.trim(),
      medida:      document.getElementById('f-medida').value.trim(),
      qtd:         parseInt(document.getElementById('f-qtd').value) || 1,
      responsavel: document.getElementById('f-resp').value,
      sla:         parseInt(document.getElementById('f-sla').value) || null,
      dataEntrada: document.getElementById('f-data').value,
      obs:         document.getElementById('f-obs').value.trim(),
      prioridade:  prioDest,
      etapa:       'recebido',
      foto:        fotoBase64,
      historico:   []
    };
    adicionarHist(peca, 'Peça cadastrada');
    await dbPut(peca);
    toast('Peça cadastrada!', 'ok');
  }
  fecharModal('modal-peca');
  renderKanban();
}

// ═══════════════════════════════════════════════
// MODAL DETALHE
// ═══════════════════════════════════════════════
async function verDetalhe(id) {
  const pecas = await dbGetAll();
  const p = pecas.find(x => x.id === id);
  if (!p) return;
  document.getElementById('det-titulo').textContent = p.codigo + ' · ' + p.projeto;
  const dias   = diasDesde(p.dataEntrada);
  const atras  = p.etapa !== 'finalizado' && p.sla && dias > p.sla;

  const etapaIdx = ETAPAS.findIndex(e => e.id === p.etapa);
  const trackHTML = ETAPAS.map((et, i) => {
    const cls = i < etapaIdx ? 'done' : (i === etapaIdx ? 'current' : '');
    return `<span class="etapa-chip ${cls}">${et.label}</span>`;
  }).join('');

  const moverHTML = ETAPAS.filter(et => et.id !== p.etapa).map(et =>
    `<button class="mover-btn" onclick="moverPara('${p.id}','${et.id}')">${et.label}</button>`
  ).join('');

  const histHTML = (p.historico || []).slice().reverse().map(h =>
    `<div class="hist-item"><div class="hist-dot"></div><div><div class="hist-txt">${h.acao} <span class="hist-user">— ${h.user}</span></div><div class="hist-time">${h.data}</div></div></div>`
  ).join('') || '<div style="color:var(--text-dim);font-size:12px">Sem histórico</div>';

  document.getElementById('det-body').innerHTML = `
    <div style="margin-bottom:14px">${trackHTML}</div>
    <div class="det-grid">
      <div class="det-field"><label>Código</label><p class="mono">${p.codigo}</p></div>
      <div class="det-field"><label>Projeto</label><p>${p.projeto}</p></div>
      <div class="det-field"><label>Material</label><p>${p.material || '—'}</p></div>
      <div class="det-field"><label>Medida</label><p>${p.medida || '—'}</p></div>
      <div class="det-field"><label>Quantidade</label><p>${p.qtd || 1}</p></div>
      <div class="det-field"><label>Responsável</label><p style="color:var(--blue)">${p.responsavel || '—'}</p></div>
      <div class="det-field"><label>Entrada</label><p>${p.dataEntrada || '—'}</p></div>
      <div class="det-field"><label>Dias / SLA</label><p style="color:${atras ? 'var(--red)' : 'var(--green)'}">${dias}d ${p.sla ? '/ '+p.sla+'d' : ''} ${atras ? '⚠ ATRASADO' : ''}</p></div>
    </div>
    ${p.obs ? `<div style="background:var(--bg3);border-radius:6px;padding:10px;font-size:13px;margin-bottom:14px;color:var(--text-dim)">${p.obs}</div>` : ''}
    ${p.foto ? `<img src="${p.foto}" style="width:100%;border-radius:8px;margin-bottom:14px;cursor:pointer;max-height:180px;object-fit:cover" onclick="abrirFotoById('${p.id}')">` : ''}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px">Mover para etapa</div>
    <div class="mover-btns" style="margin-bottom:20px">${moverHTML}</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn" onclick="abrirModalEditar('${p.id}')">✏ Editar</button>
      <button class="btn danger" onclick="excluirPeca('${p.id}')">🗑 Excluir</button>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px">Histórico</div>
    <div class="hist-list">${histHTML}</div>
  `;
  document.getElementById('modal-det').style.display = 'flex';
}

async function moverPara(id, etapaId) {
  const pecas = await dbGetAll();
  const p = pecas.find(x => x.id === id);
  if (!p) return;
  const antigo = p.etapa;
  p.etapa = etapaId;
  adicionarHist(p, `Movida de ${etapaLabel(antigo)} → ${etapaLabel(etapaId)}`);
  await dbPut(p);
  fecharModal('modal-det');
  toast(`${p.codigo} → ${etapaLabel(etapaId)}`, 'ok');
  renderKanban();
}

async function excluirPeca(id) {
  if (!confirm('Excluir esta peça permanentemente?')) return;
  await dbDelete(id);
  fecharModal('modal-det');
  toast('Peça excluída', 'ok');
  renderKanban();
}

// ═══════════════════════════════════════════════
// ATRASADOS
// ═══════════════════════════════════════════════
async function renderAtrasados() {
  const pecas = await dbGetAll();
  const atrasados = pecas.filter(p => p.etapa !== 'finalizado' && p.sla && p.dataEntrada && diasDesde(p.dataEntrada) > p.sla);
  const el = document.getElementById('atrasados-full');
  if (atrasados.length === 0) {
    el.innerHTML = '<div style="color:var(--green);font-size:14px;padding:20px 0">✅ Nenhuma peça atrasada!</div>';
    return;
  }
  el.innerHTML = atrasados.map(p => `
    <div class="atrasado-item" style="margin-bottom:8px;padding:12px">
      <div>
        <div class="mono" style="font-size:14px">${p.codigo}</div>
        <div style="font-size:11px;color:var(--text-dim)">${p.projeto}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:11px;color:var(--text-dim)">Etapa</div>
        <div style="font-size:12px">${etapaLabel(p.etapa)}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:11px;color:var(--text-dim)">Resp.</div>
        <div style="font-size:12px;color:var(--blue)">${p.responsavel || '—'}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--red);font-family:monospace">${diasDesde(p.dataEntrada)}</div>
        <div style="font-size:10px;color:var(--text-dim)">dias / SLA ${p.sla}d</div>
      </div>
      <button class="btn" onclick="verDetalhe('${p.id}')">Ver</button>
    </div>`).join('');
}

// ═══════════════════════════════════════════════
// RELATÓRIO
// ═══════════════════════════════════════════════
async function renderRelatorio() {
  const pecas = await dbGetAll();
  const hoje  = new Date().toLocaleDateString('pt-BR');
  const total  = pecas.length;
  const fin    = pecas.filter(p => p.etapa === 'finalizado').length;
  const atras  = pecas.filter(p => p.etapa !== 'finalizado' && p.sla && p.dataEntrada && diasDesde(p.dataEntrada) > p.sla).length;
  const andamento = pecas.filter(p => p.etapa !== 'finalizado').length;

  document.getElementById('rel-stats').innerHTML = `
    <div class="rel-card"><div class="rel-num">${total}</div><div class="rel-label">Total</div></div>
    <div class="rel-card"><div class="rel-num" style="color:var(--blue)">${andamento}</div><div class="rel-label">Em Andamento</div></div>
    <div class="rel-card"><div class="rel-num" style="color:var(--green)">${fin}</div><div class="rel-label">Finalizadas</div></div>
    <div class="rel-card"><div class="rel-num" style="color:var(--red)">${atras}</div><div class="rel-label">Atrasadas</div></div>
  `;

  const projetos = [...new Set(pecas.map(p => p.projeto))];
  const resPorProj = projetos.map(pr => {
    const n = pecas.filter(p => p.projeto === pr).length;
    return `<div class="rel-card"><div class="rel-num" style="font-size:24px">${n}</div><div class="rel-label">${pr}</div></div>`;
  }).join('');
  document.getElementById('rel-stats').innerHTML += resPorProj;

  document.getElementById('rel-tbody').innerHTML = pecas.sort((a,b) => a.projeto.localeCompare(b.projeto)).map(p => {
    const atrasado = p.etapa !== 'finalizado' && p.sla && p.dataEntrada && diasDesde(p.dataEntrada) > p.sla;
    return `<tr>
      <td class="mono" style="color:var(--amber)">${p.codigo}</td>
      <td>${p.projeto}</td>
      <td>${p.material || '—'}</td>
      <td>${p.qtd || 1}</td>
      <td>${etapaLabel(p.etapa)}</td>
      <td style="color:var(--blue)">${p.responsavel || '—'}</td>
      <td>${p.dataEntrada || '—'}</td>
      <td style="color:${atrasado ? 'var(--red)' : 'inherit'}">${diasDesde(p.dataEntrada)}${atrasado ? ' ⚠' : ''}</td>
    </tr>`;
  }).join('');
}

async function exportarCSV() {
  const pecas = await dbGetAll();
  const header = ['Código','Projeto','Material','Medida','Qtd','Etapa','Responsável','Entrada','Dias','SLA','Prioridade'];
  const rows = pecas.map(p => [
    p.codigo, p.projeto, p.material||'', p.medida||'', p.qtd||1,
    etapaLabel(p.etapa), p.responsavel||'', p.dataEntrada||'',
    diasDesde(p.dataEntrada), p.sla||'', p.prioridade||''
  ]);
  const csv = [header, ...rows].map(r => r.map(x => `"${x}"`).join(',')).join('\n');
  const b = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `2T_Producao_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function etapaLabel(id) {
  return (ETAPAS.find(e => e.id === id) || {}).label || id;
}

function proximaEtapa(etapaId) {
  const idx = ETAPAS.findIndex(e => e.id === etapaId);
  return idx >= 0 && idx < ETAPAS.length - 1 ? ETAPAS[idx + 1].id : null;
}

function diasDesde(data) {
  if (!data) return 0;
  const d = new Date(data + 'T00:00:00');
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  return Math.max(0, Math.floor((hoje - d) / 86400000));
}

function adicionarHist(p, acao) {
  if (!p.historico) p.historico = [];
  p.historico.push({
    acao,
    user: currentUser ? currentUser.nome : 'Sistema',
    data: new Date().toLocaleString('pt-BR')
  });
}

function atualizarProjFiltro(pecas) {
  const sel = document.getElementById('filter-proj');
  const cur = sel.value;
  const projs = [...new Set(pecas.map(p => p.projeto))].sort();
  sel.innerHTML = '<option value="">Todos os projetos</option>' + projs.map(p => `<option value="${p}">${p}</option>`).join('');
  if (projs.includes(cur)) sel.value = cur;
}

function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

async function abrirFoto(id) {
  const pecas = await dbGetAll();
  const p = pecas.find(x => x.id === id);
  if (!p || !p.foto) return;
  document.getElementById('foto-full').src = p.foto;
  document.getElementById('foto-modal').style.display = 'block';
}
async function abrirFotoById(id) { abrirFoto(id); }
function fecharFotoModal() {
  document.getElementById('foto-modal').style.display = 'none';
}

let toastTimer;
function toast(msg, tipo = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + tipo;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 2800);
}

// Fechar modais com ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['modal-peca','modal-det'].forEach(id => {
      if (document.getElementById(id).style.display !== 'none') fecharModal(id);
    });
    fecharFotoModal();
  }
});

// Fechar modal clicando fora
['modal-peca','modal-det'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) fecharModal(id);
  });
});
